<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Mein Online Shop</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>

</head>

<body>

<header>

<h1>Mein Online Shop</h1>

<input id="search" placeholder="Produkt suchen">

<select id="categoryFilter">
<option value="all">Alle Kategorien</option>
<option value="kleidung">Kleidung</option>
<option value="accessoires">Accessoires</option>
</select>

</header>

<div id="products" class="products"></div>

<h2>Warenkorb</h2>

<ul id="cart"></ul>

<p id="total"></p>

<select id="shipping">

<option value="0">Digital / kostenlos</option>
<option value="5">Standard Versand 5€</option>
<option value="10">Express Versand 10€</option>

</select>

<div id="paypal-button-container"></div>

<script src="script.js"></script>

</body>
</html>
